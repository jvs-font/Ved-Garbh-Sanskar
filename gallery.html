    <script>
        function toggleGallery(type) {
            const photosSection = document.getElementById('photos-section');
            const videosSection = document.getElementById('videos-section');
            const btnPhotos = document.getElementById('btn-photos');
            const btnVideos = document.getElementById('btn-videos');

            if (type === 'photos') {
                photosSection.style.display = 'block';
                videosSection.style.display = 'none';
                btnPhotos.classList.replace('btn-outline', 'btn-primary');
                btnVideos.classList.replace('btn-primary', 'btn-outline');
            } else {
                photosSection.style.display = 'none';
                videosSection.style.display = 'block';
                btnVideos.classList.replace('btn-outline', 'btn-primary');
                btnPhotos.classList.replace('btn-primary', 'btn-outline');
            }
        }

        // Lightbox functionality
        let currentImageIndex = 0;
        const images = [];
        
        document.addEventListener("DOMContentLoaded", () => {
            const bentoItems = document.querySelectorAll("#photos-section .bento-item img");
            bentoItems.forEach((img, index) => {
                images.push(img.src);
                img.parentElement.onclick = () => openLightbox(index);
            });
            
            // Close lightbox when clicking outside the image
            document.getElementById("lightbox").addEventListener("click", function(e) {
                if(e.target === this || e.target.classList.contains("lightbox-content-wrapper")) {
                    closeLightbox();
                }
            });
            
            // Keyboard navigation
            document.addEventListener("keydown", function(e) {
                const lightbox = document.getElementById("lightbox");
                if (lightbox.style.display === "block") {
                    if (e.key === "Escape") closeLightbox();
                    if (e.key === "ArrowLeft") changeImage(-1);
                    if (e.key === "ArrowRight") changeImage(1);
                }
            });
        });

        function openLightbox(index) {
            const lightbox = document.getElementById("lightbox");
            const lightboxImg = document.getElementById("lightbox-img");
            currentImageIndex = index;
            
            // Temporarily disable transition for instant src switch
            lightboxImg.style.transition = "none";
            lightboxImg.style.opacity = 0;
            lightboxImg.style.transform = "scale(0.8)";
            
            lightboxImg.src = images[currentImageIndex];
            lightbox.style.display = "block";
            
            // Force reflow
            void lightbox.offsetWidth;
            
            // Restore transition and animate in
            lightboxImg.style.transition = "transform 0.3s ease-in-out, opacity 0.3s ease-in-out";
            lightbox.classList.add("show");
            
            // Allow image transition after src is loaded
            lightboxImg.onload = function() {
                lightboxImg.style.opacity = 1;
                lightboxImg.style.transform = "scale(1)";
            };
        }

        function closeLightbox() {
            const lightbox = document.getElementById("lightbox");
            const lightboxImg = document.getElementById("lightbox-img");
            
            lightbox.classList.remove("show");
            lightboxImg.style.opacity = 0;
            lightboxImg.style.transform = "scale(0.8)";
            
            setTimeout(() => {
                lightbox.style.display = "none";
            }, 300);
        }

        function changeImage(step) {
            currentImageIndex += step;
            if (currentImageIndex >= images.length) {
                currentImageIndex = 0;
            } else if (currentImageIndex < 0) {
                currentImageIndex = images.length - 1;
            }
            
            const lightboxImg = document.getElementById("lightbox-img");
            
            // Fade out
            lightboxImg.style.opacity = 0;
            lightboxImg.style.transform = "scale(0.95)";
            
            setTimeout(() => {
                lightboxImg.src = images[currentImageIndex];
                
                lightboxImg.onload = function() {
                    lightboxImg.style.opacity = 1;
                    lightboxImg.style.transform = "scale(1)";
                };
            }, 200);
        }
    </script>

    <!-- Lightbox Modal -->
    <div id="lightbox" class="lightbox">
        <span class="close-lightbox" onclick="closeLightbox()">&times;</span>
        <div class="lightbox-content-wrapper">
            <button class="lightbox-prev" onclick="changeImage(-1)">&#10094;</button>
            <img class="lightbox-content" id="lightbox-img" alt="Enlarged gallery image">
            <button class="lightbox-next" onclick="changeImage(1)">&#10095;</button>
        </div>
    </div>
</body>
